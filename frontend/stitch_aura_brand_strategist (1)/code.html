<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Goal Setting | Quiet Luxury AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-secondary-container": "#656461",
                        "surface-container-low": "#f6f3f1",
                        "on-secondary-fixed": "#1c1c19",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#c9c6c2",
                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#bccabd",
                        "on-primary-container": "#95a397",
                        "primary-container": "#2d3930",
                        "inverse-surface": "#30302f",
                        "on-primary": "#ffffff",
                        "primary": "#18241b",
                        "on-secondary-fixed-variant": "#474743",
                        "on-surface-variant": "#434843",
                        "on-secondary": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c3c8c2",
                        "tertiary-fixed": "#e9e2d4",
                        "tertiary": "#242118",
                        "on-primary-fixed": "#131e16",
                        "surface-tint": "#556157",
                        "tertiary-fixed-dim": "#ccc6b9",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#3d4a40",
                        "surface-variant": "#e4e2e0",
                        "surface-container-highest": "#e4e2e0",
                        "secondary": "#5f5e5b",
                        "on-surface": "#1b1c1b",
                        "secondary-container": "#e5e2dd",
                        "on-tertiary-container": "#a49e93",
                        "on-tertiary-fixed-variant": "#4a463d",
                        "tertiary-container": "#39362d",
                        "surface-container": "#f0edeb",
                        "on-background": "#1b1c1b",
                        "outline": "#747873",
                        "surface-dim": "#dcdad8",
                        "primary-fixed": "#d8e6d9",
                        "secondary-fixed": "#e5e2dd",
                        "inverse-on-surface": "#f3f0ee",
                        "inverse-primary": "#bccabd",
                        "background": "#fbf9f7",
                        "surface": "#fbf9f7",
                        "surface-container-high": "#eae8e6",
                        "on-tertiary-fixed": "#1e1b13",
                        "surface-bright": "#fbf9f7"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "margin-desktop": "40px",
                        "unit": "8px",
                        "container-max-width": "1200px",
                        "gutter": "24px",
                        "margin-mobile": "20px"
                    },
                    fontFamily: {
                        "headline-lg": ["EB Garamond"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-caps": ["Inter"],
                        "display-lg": ["EB Garamond"],
                        "headline-md": ["EB Garamond"],
                        "body-sm": ["Inter"]
                    },
                    fontSize: {
                        "headline-lg": ["32px", { lineHeight: "40px", fontWeight: "500" }],
                        "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
                        "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
                        "label-caps": ["12px", { lineHeight: "16px", letterSpacing: "0.1em", fontWeight: "600" }],
                        "display-lg": ["48px", { lineHeight: "56px", letterSpacing: "-0.02em", fontWeight: "500" }],
                        "headline-md": ["24px", { lineHeight: "32px", fontWeight: "500" }],
                        "body-sm": ["14px", { lineHeight: "20px", fontWeight: "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom radio button styles for quiet luxury feel */
        input[type="radio"]:checked + div {
            border-color: #18241b; /* primary */
            background-color: #eae8e6; /* surface-container-high */
        }
        input[type="radio"]:checked + div .radio-indicator {
            border-color: #18241b;
        }
        input[type="radio"]:checked + div .radio-indicator::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #18241b;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-fixed selection:text-primary">
<!-- Header / Progress (Minimalist) -->
<header class="w-full px-margin-mobile md:px-margin-desktop py-8 flex justify-between items-center absolute top-0 left-0">
<div class="font-headline-md text-headline-md text-primary tracking-tight">Studio</div>
<div class="flex items-center gap-2">
<span class="w-12 h-1 bg-primary rounded-full opacity-100"></span>
<span class="w-12 h-1 bg-surface-variant rounded-full opacity-50"></span>
<span class="w-12 h-1 bg-surface-variant rounded-full opacity-50"></span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-margin-mobile md:px-margin-desktop py-24">
<div class="w-full max-w-xl">
<!-- Typography Anchor -->
<div class="text-center mb-16">
<h1 class="font-display-lg text-display-lg text-primary mb-4">Define your <i class="italic">objective</i></h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Select the primary outcome you wish to achieve with this strategy. We will tailor the architectural approach accordingly.</p>
</div>
<!-- Goal Selection Form -->
<form class="flex flex-col gap-4" id="goal-form">
<!-- Option 1: Engagement -->
<label class="relative cursor-pointer group">
<input checked="" class="peer sr-only" name="goal" type="radio" value="engagement"/>
<div class="w-full p-6 md:p-8 rounded-lg border border-surface-variant bg-surface-container-low transition-all duration-300 hover:bg-surface-container hover:border-outline-variant flex items-start gap-6">
<div class="w-12 h-12 rounded-full bg-surface text-primary flex items-center justify-center shrink-0 border border-surface-variant shadow-sm">
<span class="material-symbols-outlined text-[24px]">vital_signs</span>
</div>
<div class="flex-grow pt-1">
<h2 class="font-headline-md text-headline-md text-primary mb-1"><i class="italic">Deep Engagement</i></h2>
<p class="font-body-md text-body-md text-on-surface-variant">Foster meaningful conversations, increase dwell time, and build a highly interactive community around your narrative.</p>
</div>
<div class="radio-indicator relative w-5 h-5 rounded-full border border-outline mt-2 transition-colors duration-200 shrink-0"></div>
</div>
</label>
<!-- Option 2: Followers -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="goal" type="radio" value="followers"/>
<div class="w-full p-6 md:p-8 rounded-lg border border-surface-variant bg-surface-container-low transition-all duration-300 hover:bg-surface-container hover:border-outline-variant flex items-start gap-6">
<div class="w-12 h-12 rounded-full bg-surface text-primary flex items-center justify-center shrink-0 border border-surface-variant shadow-sm">
<span class="material-symbols-outlined text-[24px]">group_add</span>
</div>
<div class="flex-grow pt-1">
<h2 class="font-headline-md text-headline-md text-primary mb-1"><i class="italic">Audience Expansion</i></h2>
<p class="font-body-md text-body-md text-on-surface-variant">Optimize content for virality and reach, prioritizing top-of-funnel discovery to rapidly scale your subscriber base.</p>
</div>
<div class="radio-indicator relative w-5 h-5 rounded-full border border-outline mt-2 transition-colors duration-200 shrink-0"></div>
</div>
</label>
<!-- Option 3: Sales -->
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="goal" type="radio" value="sales"/>
<div class="w-full p-6 md:p-8 rounded-lg border border-surface-variant bg-surface-container-low transition-all duration-300 hover:bg-surface-container hover:border-outline-variant flex items-start gap-6">
<div class="w-12 h-12 rounded-full bg-surface text-primary flex items-center justify-center shrink-0 border border-surface-variant shadow-sm">
<span class="material-symbols-outlined text-[24px]">local_mall</span>
</div>
<div class="flex-grow pt-1">
<h2 class="font-headline-md text-headline-md text-primary mb-1"><i class="italic">Commercial Conversion</i></h2>
<p class="font-body-md text-body-md text-on-surface-variant">Drive intent and guide users seamlessly from awareness to purchase, maximizing ROI and transaction volume.</p>
</div>
<div class="radio-indicator relative w-5 h-5 rounded-full border border-outline mt-2 transition-colors duration-200 shrink-0"></div>
</div>
</label>
<label class="relative cursor-pointer group">
<input class="peer sr-only" name="goal" type="radio" value="custom"/>
<div class="w-full p-6 md:p-8 rounded-lg border border-surface-variant bg-surface-container-low transition-all duration-300 hover:bg-surface-container hover:border-outline-variant flex items-start gap-6">
<div class="w-12 h-12 rounded-full bg-surface text-primary flex items-center justify-center shrink-0 border border-surface-variant shadow-sm">
<span class="material-symbols-outlined text-[24px]">edit_note</span>
</div>
<div class="flex-grow pt-1">
<h2 class="font-headline-md text-headline-md text-primary mb-1"><i class="italic">Custom Objective</i></h2>
<p class="font-body-md text-body-md text-on-surface-variant mb-4">Define a bespoke outcome tailored to your unique brand requirements.</p>
<textarea class="w-full bg-surface border border-outline-variant rounded-lg p-4 font-body-md text-body-md focus:border-primary focus:ring-0 transition-colors duration-200 placeholder:text-on-tertiary-container" onclick="event.stopPropagation();" placeholder="Describe your objective here..." rows="3"></textarea>
</div>
<div class="radio-indicator relative w-5 h-5 rounded-full border border-outline mt-2 transition-colors duration-200 shrink-0"></div>
</div>
</label></form>
<!-- Actions -->
<div class="mt-12 flex items-center justify-between pt-8 border-t border-surface-variant">
<button class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors duration-200 px-4 py-2" type="button">
                    Skip for now
                </button>
<button class="bg-primary text-on-primary font-label-caps text-label-caps px-8 py-4 rounded-full hover:opacity-90 transition-opacity duration-200 shadow-sm flex items-center gap-2" type="button">
                    Continue
                    <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</div>
</main>
</body></html>
