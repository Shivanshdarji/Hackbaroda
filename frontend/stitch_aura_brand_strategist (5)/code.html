<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Main Content Area: Centered, spacious, Quiet Luxury aesthetic -->
<main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop w-full mx-auto max-w-container-max-width">
<div class="w-full max-w-[800px] flex flex-col gap-16">
<!-- Progress Indicator -->
<div class="w-full flex items-center gap-2">
<div class="h-[2px] flex-1 bg-primary rounded-full"></div>
<div class="h-[2px] flex-1 bg-surface-variant rounded-full"></div>
<div class="h-[2px] flex-1 bg-surface-variant rounded-full"></div>
<div class="h-[2px] flex-1 bg-surface-variant rounded-full"></div>
</div>
<!-- Header Section -->
<header class="text-center md:text-left flex flex-col gap-4">
<p class="font-label-caps text-label-caps text-secondary uppercase tracking-widest">Step 1 of 4</p>
<h1 class="font-display-lg text-display-lg text-primary animate-reveal">Discovering your brand <span class="italic">essence</span></h1>
<p class="font-body-lg text-body-lg text-secondary max-w-[600px] animate-reveal opacity-0" style="animation-delay: 0.15s;">
                    To tailor your strategy, we need to understand where your brand currently stands and the visual language it speaks.
                </p>
</header>
<!-- Form Flow -->
<div class="flex flex-col gap-12">
<!-- Instagram Link Input -->
<section class="flex flex-col gap-4">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="instagram-handle">Social Presence</label>
<div class="relative group">
<span class="absolute left-0 bottom-[10px] text-secondary font-body-lg material-symbols-outlined text-[20px] pointer-events-none">link</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 pl-8 pb-2 text-body-lg font-body-lg text-on-surface transition-colors duration-300 placeholder:text-surface-dim" id="instagram-handle" placeholder="instagram.com/yourbrand" type="text"/>
</div><button class="mt-4 font-label-caps text-label-caps text-secondary hover:text-primary transition-colors uppercase tracking-widest flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[16px]">add</span>
    Add another profile
</button>
</section><section class="flex flex-col gap-4">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" for="brand-location">
        Brand Location
    </label>
<div class="relative group">
<span class="absolute left-0 bottom-[10px] text-secondary font-body-lg material-symbols-outlined text-[20px] pointer-events-none">location_on</span>
<input class="w-full bg-transparent border-0 border-b border-outline-variant focus:border-primary focus:ring-0 pl-8 pb-2 text-body-lg font-body-lg text-on-surface transition-colors duration-300 placeholder:text-surface-dim" id="brand-location" placeholder="City, Country or Remote" type="text"/>
</div>
</section>
<!-- Brand Level Selection Cards -->
<section class="flex flex-col gap-6">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">
                        Current Brand Maturity
                    </label>
<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
<!-- Option 1 -->
<button class="group relative flex flex-col items-start text-left p-6 rounded-lg bg-surface-container-lowest border border-surface-variant hover:border-primary-fixed-dim hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary-fixed focus:ring-offset-2 focus:ring-offset-background" type="button">
<span class="material-symbols-outlined text-secondary group-hover:text-primary mb-6 transition-colors duration-300" data-icon="seedling" data-weight="fill" style="font-variation-settings: 'FILL' 1;">eco</span>
<h3 class="font-headline-md text-headline-md text-primary mb-2">Emerging</h3>
<p class="font-body-sm text-body-sm text-secondary">Finding our voice, defining the aesthetic, and beginning to build a <span class="italic">dedicated community</span>.</p>
</button>
<!-- Option 2 (Active/Selected State Example) -->
<button class="group relative flex flex-col items-start text-left p-6 rounded-lg bg-surface-container-low border border-primary transition-all duration-300 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary-fixed focus:ring-offset-2 focus:ring-offset-background shadow-[0_4px_24px_rgba(24,36,27,0.04)]" type="button">
<span class="absolute top-4 right-4 material-symbols-outlined text-primary text-[20px] animate-gentle-pulse" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<span class="material-symbols-outlined text-primary mb-6" data-icon="auto_awesome" data-weight="fill" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<h3 class="font-headline-md text-headline-md text-primary mb-2">Established</h3>
<p class="font-body-sm text-body-sm text-on-surface-variant">Consistent identity, growing audience, looking to refine and elevate our <span class="italic">strategic positioning</span>.</p>
</button>
<!-- Option 3 -->
<button class="group relative flex flex-col items-start text-left p-6 rounded-lg bg-surface-container-lowest border border-surface-variant hover:border-primary-fixed-dim hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary-fixed focus:ring-offset-2 focus:ring-offset-background" type="button">
<span class="material-symbols-outlined text-secondary group-hover:text-primary mb-6 transition-colors duration-300" data-icon="diamond" data-weight="fill" style="font-variation-settings: 'FILL' 1;">diamond</span>
<h3 class="font-headline-md text-headline-md text-primary mb-2">Premium</h3>
<p class="font-body-sm text-body-sm text-secondary">Mature brand language, high-end positioning, seeking subtle optimizations and <span class="italic">thought leadership</span>.</p>
</button>
<button class="group relative flex flex-col items-start text-left p-6 rounded-lg bg-surface-container-lowest border border-surface-variant hover:border-primary-fixed-dim hover:bg-surface-container-low transition-all duration-300 active:scale-[0.98] focus:outline-none focus:ring-2 focus:ring-primary-fixed focus:ring-offset-2 focus:ring-offset-background" type="button">
<span class="material-symbols-outlined text-secondary group-hover:text-primary mb-6 transition-colors duration-300">edit_note</span>
<h3 class="font-headline-md text-headline-md text-primary mb-2">Custom</h3>
<p class="font-body-sm text-body-sm text-secondary">Describe your brand's <span class="italic">unique stage</span> in your own words.</p>
</button></div>
</section>
<!-- Aesthetic Tags (Bento-ish asymmetric layout) -->
<section class="flex flex-col gap-6">
<div class="flex justify-between items-end">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">
                            Aesthetic Direction
                        </label>
<span class="font-body-sm text-body-sm text-secondary">Select up to 3</span>
</div>
<div class="flex flex-wrap gap-3">
<button class="px-5 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-secondary font-body-sm text-body-sm hover:border-primary hover:text-primary transition-colors">Minimalist</button>
<button class="px-5 py-2 rounded-full border border-primary bg-primary text-on-primary font-body-sm text-body-sm shadow-[0_2px_8px_rgba(24,36,27,0.15)] transition-colors">Quiet Luxury</button>
<button class="px-5 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-secondary font-body-sm text-body-sm hover:border-primary hover:text-primary transition-colors">Editorial</button>
<button class="px-5 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-secondary font-body-sm text-body-sm hover:border-primary hover:text-primary transition-colors">Vibrant</button>
<button class="px-5 py-2 rounded-full border border-primary bg-primary text-on-primary font-body-sm text-body-sm shadow-[0_2px_8px_rgba(24,36,27,0.15)] transition-colors">Monochrome</button>
<button class="px-5 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-secondary font-body-sm text-body-sm hover:border-primary hover:text-primary transition-colors">Organic</button>
<button class="px-5 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-secondary font-body-sm text-body-sm hover:border-primary hover:text-primary transition-colors">Bold</button>
<button class="px-5 py-2 rounded-full border border-surface-variant bg-surface-container-lowest text-secondary font-body-sm text-body-sm hover:border-primary hover:text-primary transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]">add</span>
    Custom
</button></div>
</section>
</div>
<!-- Footer Actions -->
<footer class="pt-8 border-t border-surface-variant flex justify-between items-center mt-4">
<button class="font-label-caps text-label-caps text-secondary hover:text-primary transition-colors uppercase tracking-widest flex items-center gap-2" type="button">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                    Back
                </button>
<button class="group bg-primary text-on-primary px-8 py-4 rounded-lg font-label-caps text-label-caps uppercase tracking-widest hover:bg-inverse-surface transition-colors flex items-center gap-2 shadow-[0_4px_12px_rgba(24,36,27,0.1)]" type="button">
                    Continue
                    <span class="material-symbols-outlined text-[16px] transition-transform duration-300 group-hover:translate-x-1">arrow_forward</span>
</button>
</footer>
</div>
</main>
<!-- Optional: Add a very subtle gradient or texture to the background body via CSS if needed, but keeping it solid Champagne per Quiet Luxury rules is preferred for legibility. -->
</body></html>
